<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Defaults -->
    <title>Positive Dental Studio — Adana & İstanbul Diş Kliniği</title>
    <meta name="description" content="Positive Dental Studio — Adana Türkmenbaşı ve İstanbul Nişantaşı'nda modern diş kliniği. İmplant, estetik diş hekimliği, ortodonti, çocuk diş hekimliği. Ücretsiz ilk muayene." />
    <meta name="keywords" content="diş kliniği, diş hekimi, implant, ortodonti, estetik diş, adana diş, istanbul diş, positive dental" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://positivedental.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Positive Dental Studio" />
    <meta property="og:title" content="Positive Dental Studio — Modern Diş Kliniği" />
    <meta property="og:description" content="Adana ve İstanbul'da uzman kadrosuyla hizmet veren modern diş kliniği. Ücretsiz ilk muayene." />
    <meta property="og:url" content="https://positivedental.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect: dış kaynaklar -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Font: display=swap ile non-blocking — sadece kullanılan ağırlıklar -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0D1235" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
