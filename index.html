<!DOCTYPE html>
<!--
  ⚠️ SEO KRİTİK DOSYA — DEĞİŞTİRME!
  Bu dosyadaki meta tag sıralaması, canonical, og:tags, preconnect/preload
  ve font yükleme stratejisi SEO optimizasyonu için özel ayarlanmıştır.
  Sıralamayı, içerikleri veya yapıyı değiştirmeyin.
  Değişiklik gerekiyorsa önce kullanıcıya danışın.
-->
<html lang="tr">
  <head>
    <!-- 1. Charset & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 2. Title -->
    <title>Positive Dental Studio — Adana & İstanbul Diş Kliniği</title>

    <!-- 3. Description & SEO meta -->
    <meta name="description" content="Positive Dental Studio — Adana Türkmenbaşı ve İstanbul Nişantaşı'nda modern diş kliniği. İmplant, estetik diş hekimliği, ortodonti, çocuk diş hekimliği. Ücretsiz ilk muayene." />
    <meta name="keywords" content="diş kliniği, diş hekimi, implant, ortodonti, estetik diş, adana diş, istanbul diş, positive dental" />
    <meta name="robots" content="index, follow" />

    <!-- 4. Canonical -->
    <link rel="canonical" href="https://positive-dental.vercel.app" />

    <!-- 5. Preconnect & DNS prefetch (CSS/font'lardan önce bağlantı kur) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- 6. CSS files (font non-blocking) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- 7. Social metatags (Open Graph & Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Positive Dental Studio" />
    <meta property="og:title" content="Positive Dental Studio — Modern Diş Kliniği" />
    <meta property="og:description" content="Adana ve İstanbul'da uzman kadrosuyla hizmet veren modern diş kliniği. Ücretsiz ilk muayene." />
    <meta property="og:url" content="https://positive-dental.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- 8. Favicon & other meta -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230D1235'/><path d='M32 14v36M14 32h36' stroke='%2300BCD4' stroke-width='10' stroke-linecap='round'/></svg>" type="image/svg+xml" />
    <meta name="theme-color" content="#0D1235" />
  </head>

  <body>
    <!-- 9. Critical inline CSS — FCP hızlandırma -->
    <style>
      body{margin:0;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:#f1f5f9}
      .shell{min-height:100vh;display:flex;flex-direction:column;background:#fff}
      .shell-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
      .shell-logo{display:flex;align-items:center;gap:2px;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#0f172a;text-decoration:none}
      .shell-logo span{color:#0891b2;font-size:22px;line-height:1}
      .shell-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
      .shell-badge{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6366f1;margin-bottom:12px}
      .shell-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(32px,8vw,56px);line-height:1.1;color:#0f172a;margin:0}
      .shell-title em{font-style:normal;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
      .shell-sub{color:#94a3b8;font-size:14px;margin-top:8px}
      .shell-pulse{width:40px;height:40px;border-radius:50%;border:3px solid #e2e8f0;border-top-color:#6366f1;animation:spin .8s linear infinite;margin-top:24px}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>

    <!-- 10. Skeleton HTML — JS yüklenmeden önce görünür (FCP/LCP) -->
    <div id="root">
      <div class="shell">
        <header class="shell-header">
          <a class="shell-logo" href="/"><span>+</span>DENTAL STUDIO</a>
          <svg width="24" height="24" fill="none" stroke="#64748b" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </header>
        <main class="shell-hero">
          <div class="shell-badge">HIZLI RANDEVU</div>
          <h1 class="shell-title">Online<br><em>Randevu.</em></h1>
          <p class="shell-sub">5 adımda hızlıca randevunu oluştur</p>
          <div class="shell-pulse"></div>
        </main>
      </div>
    </div>

    <!-- 11. App JS -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
